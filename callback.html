<!DOCTYPE html>
<html>
<head>
  <title>TikTok Auth Callback</title>
</head>
<body>
  <h2 id="status">Обрабатываю авторизацию...</h2>
  <pre id="result"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");

    if (error) {
      document.getElementById("status").innerText = "Ошибка: " + error;
    } else if (code) {
      document.getElementById("status").innerText = "✅ Код получен!";
      document.getElementById("result").innerText = "code=" + code;
    } else {
      document.getElementById("status").innerText = "Параметры не найдены";
    }
  </script>
</body>
</html>
