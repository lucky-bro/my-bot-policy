<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5wordsday — Post Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f5f2eb;
            --accent: #ff3c00;
            --mid: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,60,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,60,0,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 32px;
        }

        /* Tag */
        .tag {
            display: inline-block;
            font-family: 'Syne Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 12px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.1s;
        }

        /* Title */
        h1 {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.2s;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.35s;
        }

        .line {
            flex: 1;
            height: 1px;
            background: rgba(245,242,235,0.15);
        }

        .subtitle {
            font-family: 'Syne Mono', monospace;
            font-size: 13px;
            color: rgba(245,242,235,0.5);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Description */
        .description {
            font-size: 17px;
            line-height: 1.7;
            color: rgba(245,242,235,0.65);
            margin-bottom: 56px;
            max-width: 500px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.45s;
        }

        /* CTA Button */
        .btn-tiktok {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            padding: 16px 32px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.02em;
            position: relative;
            transition: transform 0.15s ease;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.55s;
        }

        .btn-tiktok::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--white);
            transform: translate(5px, 5px);
            transition: transform 0.15s ease;
        }

        .btn-tiktok:hover {
            transform: translate(-2px, -2px);
        }

        .btn-tiktok:hover::after {
            transform: translate(7px, 7px);
        }

        .btn-tiktok svg {
            width: 18px;
            height: 18px;
        }

        /* Divider */
        .divider {
            margin: 80px 0 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.65s;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(245,242,235,0.1);
        }

        .divider span {
            font-family: 'Syne Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(245,242,235,0.2);
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.75s;
        }

        .privacy-link {
            font-family: 'Syne Mono', monospace;
            font-size: 12px;
            color: rgba(245,242,235,0.3);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .privacy-link:hover {
            color: var(--accent);
        }

        .version {
            font-family: 'Syne Mono', monospace;
            font-size: 11px;
            color: rgba(245,242,235,0.15);
            letter-spacing: 0.1em;
        }

        /* Corner decoration */
        .corner {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 80px;
            height: 80px;
            opacity: 0.06;
            z-index: 0;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--white);
        }

        .corner::before {
            width: 100%;
            height: 1px;
            bottom: 0;
            right: 0;
        }

        .corner::after {
            width: 1px;
            height: 100%;
            bottom: 0;
            right: 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="corner"></div>

    <div class="container">
        <div class="tag">Personal Tool · Single User</div>

        <h1>5words<span>day</span></h1>

        <div class="subtitle-row">
            <div class="line"></div>
            <div class="subtitle">Post Automation Tool</div>
            <div class="line"></div>
        </div>

        <p class="description">
            A personal automation tool for managing and scheduling educational TikTok content. Built for one creator, one purpose.
        </p>

        <a href="https://www.tiktok.com/v2/auth/authorize/?client_key=sbaw4fcs6h22xsb57f&response_type=code&scope=user.info.basic,video.publish,video.upload&redirect_uri=https://lucky-bro.github.io/my-bot-policy/callback" class="btn-tiktok">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.73a8.27 8.27 0 004.84 1.56V6.84a4.85 4.85 0 01-1.07-.15z"/>
            </svg>
            Login with TikTok
        </a>

        <div class="divider">
            <span>legal</span>
        </div>

        <footer>
            <a href="https://lucky-bro.github.io/my-bot-policy/privacy.html" class="privacy-link">
                → Privacy Policy
            </a>
            <span class="version">v1.0.0</span>
        </footer>
    </div>

</body>
</html>
